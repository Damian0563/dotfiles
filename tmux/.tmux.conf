# --- Terminal & true color (sharp 24-bit RGB) ---
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"
set -ag terminal-overrides ",*256col*:RGB"
set -ag terminal-overrides ",*direct*:RGB"
set -as terminal-features ",xterm*:RGB"
set -as terminal-features ",screen*:RGB"
set -as terminal-features ",*:RGB"
set-environment -g COLORTERM truecolor

# --- General ---
set -g base-index 1
setw -g pane-base-index 1
set -g mouse on
set -g history-limit 50000
set -g escape-time 0
set -g focus-events on
set -g renumber-windows on

# --- Key bindings ---
unbind C-b
set -g prefix C-a
bind C-a send-prefix

bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind r source-file ~/.tmux.conf \; display "Config reloaded"

# Vim-style pane navigation
bind -r h select-pane -L
bind -r j select-pane -D
bind -r k select-pane -U
bind -r l select-pane -R

# --- Sharp color palette (Catppuccin Mocha) ---
set -g mode-style "fg=#f38ba8,bg=#313244,bold"
set -g message-style "fg=#cdd6f4,bg=#313244"
set -g message-command-style "fg=#89b4fa,bg=#313244"

set -g pane-border-style "fg=#45475a"
set -g pane-active-border-style "fg=#89b4fa"

set -g status-position top
set -g status-style "bg=#1e1e2e,fg=#cdd6f4"
set -g status-left-length 40
set -g status-right-length 80
set -g status-left "#[fg=#1e1e2e,bg=#89b4fa,bold] #S #[fg=#89b4fa,bg=#313244,nobold,noitalics] "
set -g status-right "#[fg=#a6adc8,bg=#313244] %Y-%m-%d #[fg=#1e1e2e,bg=#a6e3a1,bold] %H:%M "
setw -g window-status-style "fg=#a6adc8,bg=#313244"
setw -g window-status-current-style "fg=#1e1e2e,bg=#f5c2e7,bold"
setw -g window-status-format " #I:#W "
setw -g window-status-current-format " #I:#W "

# --- Plugin manager (TPM) ---
# Install: git clone https://github.com/tmux-plugins/tpm ~/.tmux/plugins/tpm
# Then in tmux: prefix + I  (install)  |  prefix + U  (update)  |  prefix + alt + u  (remove unused)
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

set -g @yank_action 'copy-pipe'
set -g @continuum-restore 'on'

run '~/.tmux/plugins/tpm/tpm'
